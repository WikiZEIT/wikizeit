name: Deploy to Dev Server

on:
  push:
    branches:
      - dev
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Install Lovelo font
        run: |
          mkdir -p ~/.local/share/fonts
          cp card/Lovelo\ Black.otf ~/.local/share/fonts/
          fc-cache -f -v

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Install PHP dependencies
        run: composer install --no-dev --optimize-autoloader
        working-directory: api

      - name: Validate social card SVG
        run: |
          sudo apt-get install -y libxml2-utils
          node --input-type=module <<'EOF'
          import { Liquid } from 'liquidjs';
          import { readFile, writeFile, unlink } from 'fs/promises';
          import { execSync } from 'child_process';

          const liquid = new Liquid();
          const src = await readFile('card/social-card.svg', 'utf8');
          const tmpl = liquid.parse(src);
          const rendered = await liquid.render(tmpl, {
            username: 'jcubic',
            fullname: 'Jakub T. Jankiewicz',
            title: 'Test tytu&#322; z &amp; znakami specjalnymi',
            path: '/tmp',
            date: '1 stycznia 2026'
          });
          const tmp = '/tmp/validate-social-card.svg';
          await writeFile(tmp, rendered);
          try {
            execSync(`xmllint --noout ${tmp}`, { stdio: 'inherit' });
            console.log('SVG validation passed');
          } catch {
            console.error('::error::card/social-card.svg renders invalid XML');
            process.exit(1);
          } finally {
            await unlink(tmp).catch(() => {});
          }
          EOF

      - name: Build
        run: npm run build

      - name: Validate JSON-LD
        run: |
          fail=0
          for f in $(grep -rl 'application/ld+json' _site/ --include='*.html'); do
            sed -n '/<script type="application\/ld+json">/,/<\/script>/p' "$f" \
              | sed '1d;$d' \
              | node -e 'let d=""; process.stdin.on("data",c=>d+=c); process.stdin.on("end",()=>{try{JSON.parse(d)}catch(e){console.error(e.message);process.exit(1)}})' \
              || { echo "::error::Invalid JSON-LD in $f"; fail=1; }
          done
          [ "$fail" -eq 0 ] || exit 1

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Deploy to server
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 5
          max_attempts: 3
          command: scp -P ${{ secrets.SSH_PORT }} -o StrictHostKeyChecking=no -r ./_site/* ./_site/.htaccess ${{ secrets.SSH_USER }}@${{ secrets.SSH_SERVER }}:${{ secrets.SSH_DEV_PATH }}

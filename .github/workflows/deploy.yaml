name: Deploy to MyDevil Server

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Install Lovelo font
        run: |
          mkdir -p ~/.local/share/fonts
          cp card/Lovelo\ Black.otf ~/.local/share/fonts/
          fc-cache -f -v

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Install PHP dependencies
        run: composer install --no-dev --optimize-autoloader
        working-directory: api

      - name: Build
        run: npm run build

      - name: Validate JSON-LD
        run: |
          fail=0
          for f in $(grep -rl 'application/ld+json' _site/ --include='*.html'); do
            sed -n '/<script type="application\/ld+json">/,/<\/script>/p' "$f" \
              | sed '1d;$d' \
              | node -e 'let d=""; process.stdin.on("data",c=>d+=c); process.stdin.on("end",()=>{try{JSON.parse(d)}catch(e){console.error(e.message);process.exit(1)}})' \
              || { echo "::error::Invalid JSON-LD in $f"; fail=1; }
          done
          [ "$fail" -eq 0 ] || exit 1

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Deploy to server
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          command: scp -P ${{ secrets.SSH_PORT }} -o StrictHostKeyChecking=no -r ./_site/* ./_site/.htaccess ${{ secrets.SSH_USER }}@${{ secrets.SSH_SERVER }}:${{ secrets.SSH_PATH }}
